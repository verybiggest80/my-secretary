<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>My Secretary</title>
<meta name="theme-color" content="#0e7490">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Secretary">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="app-header">
    <h1 id="page-title">首頁</h1>
    <div class="header-btns">
      <button id="header-action" class="header-btn hidden"></button>
      <button id="header-gear" class="header-btn hidden" aria-label="設置">⚙️</button>
    </div>
  </header>

  <main id="page-container">
    <!-- 頁面內容由 js/pages/* 動態載入 -->
    <section id="page-home" class="page active" aria-label="首頁"></section>
    <section id="page-todo" class="page" aria-label="To Do"></section>
    <section id="page-work" class="page" aria-label="Work"></section>
  </main>

  <nav class="tab-bar" role="tablist">
    <!-- 首頁固定在最左邊 -->
    <button class="tab active" data-page="home" role="tab">
      <span class="tab-icon">&#8962;</span><span class="tab-label">首頁</span>
    </button>
    <button class="tab" data-page="todo" role="tab">
      <span class="tab-icon">&#10003;</span><span class="tab-label">To Do</span>
    </button>
    <button class="tab" data-page="work" role="tab">
      <span class="tab-icon">&#128188;</span><span class="tab-label">Work</span>
    </button>
  </nav>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
